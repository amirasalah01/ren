name: Rentify CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  BACKEND_DIR: /home/ubuntu/ren

jobs:
  # ─────────────────────────────────────────
  # 1. Backend CI
  # ─────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81"
          pip install -r requirements-dev.txt

      - name: Run backend tests
        env:
          GITHUB_ACTIONS: "true"
        run: pytest

  # ─────────────────────────────────────────
  # 2. Frontend CI
  # ─────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: http://rentify-alb-73041822.us-east-1.elb.amazonaws.com/api
        run: npm run build

  # ─────────────────────────────────────────
  # 3. Deploy — Docker Compose sur EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2 via Docker Compose
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Validate secrets
        run: |
          set -e
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "❌ Missing SSH_PRIVATE_KEY" && exit 1)
          test -n "${{ secrets.BASTION_HOST }}"    || (echo "❌ Missing BASTION_HOST"    && exit 1)
          test -n "${{ secrets.EC2_HOST }}"        || (echo "❌ Missing EC2_HOST"        && exit 1)
          echo "✅ All secrets present"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.BASTION_HOST }}" >> ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no

          Host backend
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via Docker Compose
        run: |
          ssh backend 'bash -s' << 'EOF'
          set -e
          echo "📥 Git pull..."
          cd /home/ubuntu/ren
          git fetch origin main
          git reset --hard origin/main

          echo "🐳 Docker Compose rebuild..."
          docker-compose down --remove-orphans
          docker-compose up -d --build

          echo "⏳ Waiting for backend..."
          sleep 10

          echo "✅ Status:"
          docker-compose ps

          echo "🏥 Health check:"
          curl -sf http://localhost:8000/api/health/ && echo "Backend OK ✅" || echo "Backend ❌"
          curl -sf http://localhost:80 && echo "Frontend OK ✅" || echo "Frontend ❌"
          EOF
