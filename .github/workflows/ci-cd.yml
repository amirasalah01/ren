name: Rentify CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: rentify-react-app
  VITE_API_URL: http://rentify-alb-73041822.us-east-1.elb.amazonaws.com/api
  BACKEND_HOST: ${{ secrets.EC2_HOST }}
  BASTION_HOST: ${{ secrets.BASTION_HOST }}
  BASTION_KNOWN_HOSTS: ${{ secrets.BASTION_KNOWN_HOSTS }}

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          # simplejwt imports pkg_resources, which is missing in newer setuptools releases
          pip install "setuptools<81"
          pip install -r requirements-dev.txt
          pip install django-storages boto3

      - name: Run backend tests
        env:
          GITHUB_ACTIONS: "true"
        run: pytest

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
        run: npm run build

  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Configure known_hosts
        run: |
          touch ~/.ssh/known_hosts
          if [ -n "${BASTION_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${BASTION_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${BASTION_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Configure SSH bastion and target hosts
        run: |
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${BASTION_HOST}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking yes

          Host backend
            HostName ${BACKEND_HOST}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            ProxyJump bastion
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy backend service
        run: |
          ssh backend << 'EOF'
          set -e
          BACKEND_DIR="/home/ubuntu/ren/backend"
          cd /home/ubuntu/ren
          git fetch origin main
          git reset --hard origin/main

          cd "${BACKEND_DIR}"
          "${BACKEND_DIR}/venv/bin/pip" install -r requirements.txt
          "${BACKEND_DIR}/venv/bin/python" manage.py migrate --noinput

          if sudo systemctl list-unit-files | grep -q '^gunicorn\\.service'; then
            sudo systemctl restart gunicorn
          else
            if pgrep -f "${BACKEND_DIR}/venv/bin/gunicorn.*rentify.wsgi:application" >/dev/null; then
              while read -r pid; do
                kill -TERM "${pid}"
              done < <(pgrep -f "${BACKEND_DIR}/venv/bin/gunicorn.*rentify.wsgi:application")
              sleep 5
            fi
            "${BACKEND_DIR}/venv/bin/gunicorn" --chdir "${BACKEND_DIR}" rentify.wsgi:application --bind 0.0.0.0:8000 --daemon
          fi
          EOF

  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
        run: npm run build

      - name: Deploy to S3
        run: aws s3 sync frontend/dist s3://${S3_BUCKET} --delete
