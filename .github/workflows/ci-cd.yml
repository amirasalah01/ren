name: Rentify CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: rentify-react-app
  VITE_API_URL: http://rentify-alb-73041822.us-east-1.elb.amazonaws.com/api
  GUNICORN_SHUTDOWN_TIMEOUT: "15"
  BACKEND_DIR: /home/ubuntu/ren/backend

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81"
          pip install -r requirements-dev.txt

      - name: Run backend tests
        env:
          GITHUB_ACTIONS: "true"
        run: pytest

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
        run: npm run build

  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      BACKEND_HOST: ${{ secrets.EC2_HOST }}
      BASTION_HOST: ${{ secrets.BASTION_HOST }}
      BASTION_KNOWN_HOSTS: ${{ secrets.BASTION_KNOWN_HOSTS }}
    steps:
      - name: Validate secrets
        run: |
          set -euo pipefail
          test -n "${BACKEND_HOST}"                    || (echo "❌ Missing EC2_HOST"        && exit 1)
          test -n "${BASTION_HOST}"                    || (echo "❌ Missing BASTION_HOST"    && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}"     || (echo "❌ Missing SSH_PRIVATE_KEY" && exit 1)
          # BASTION_KNOWN_HOSTS is optional — workflow will ssh-keyscan if absent
          if [ -z "${BASTION_KNOWN_HOSTS}" ]; then
            echo "ℹ️ BASTION_KNOWN_HOSTS not set; will use ssh-keyscan fallback"
          fi
          echo "✅ Required secrets present"
          echo "BASTION_HOST=${BASTION_HOST}"
          echo "BACKEND_HOST=${BACKEND_HOST}"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Configure known_hosts
        run: |
          touch ~/.ssh/known_hosts
          if [ -n "${BASTION_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${BASTION_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${BASTION_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Configure SSH bastion and target hosts
        run: |
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${BASTION_HOST}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking yes

          Host backend
            HostName ${BACKEND_HOST}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            ProxyJump bastion
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy backend service
        run: |
          ssh backend BACKEND_DIR="${BACKEND_DIR}" GUNICORN_SHUTDOWN_TIMEOUT="${GUNICORN_SHUTDOWN_TIMEOUT}" 'bash -s' << 'EOF'
          set -e
          cd /home/ubuntu/ren
          git fetch origin main
          git reset --hard origin/main

          cd "${BACKEND_DIR}"
          "${BACKEND_DIR}/venv/bin/pip" install -r requirements.txt
          "${BACKEND_DIR}/venv/bin/python" manage.py migrate --noinput

          if sudo systemctl list-unit-files | grep -q '^gunicorn\.service'; then
            sudo systemctl restart gunicorn
          else
            PID_FILE="${BACKEND_DIR}/gunicorn.pid"
            if [ -f "${PID_FILE}" ]; then
              OLD_PID="$(cat "${PID_FILE}")"
              if [ -n "${OLD_PID}" ] && kill -0 "${OLD_PID}" 2>/dev/null; then
                kill -TERM "${OLD_PID}"
                for _ in $(seq 1 "${GUNICORN_SHUTDOWN_TIMEOUT}"); do
                  if ! kill -0 "${OLD_PID}" 2>/dev/null; then
                    break
                  fi
                  sleep 1
                done
                if kill -0 "${OLD_PID}" 2>/dev/null; then
                  echo "Gunicorn PID ${OLD_PID} did not exit gracefully; sending SIGKILL"
                  kill -KILL "${OLD_PID}" || true
                fi
              fi
            fi
            "${BACKEND_DIR}/venv/bin/gunicorn" --chdir "${BACKEND_DIR}" rentify.wsgi:application --bind 0.0.0.0:8000 --pid "${PID_FILE}" --daemon
          fi
          EOF

  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - backend-ci
      - frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Validate AWS secrets
        run: |
          set -e
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"     || (echo "❌ Missing AWS_ACCESS_KEY_ID"     && exit 1)
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "❌ Missing AWS_SECRET_ACCESS_KEY" && exit 1)
          test -n "${{ secrets.AWS_SESSION_TOKEN }}"     || (echo "❌ Missing AWS_SESSION_TOKEN"     && exit 1)
          echo "✅ All AWS secrets present"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
        run: npm run build

      - name: Deploy to S3
        run: aws s3 sync frontend/dist s3://${{ env.S3_BUCKET }} --delete
