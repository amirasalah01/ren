name: Rentify CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────
  # 1. Backend CI
  # ─────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81"
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          GITHUB_ACTIONS: "true"
        run: pytest

  # ─────────────────────────────────────────
  # 2. Frontend CI
  # ─────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: http://rentify-alb-73041822.us-east-1.elb.amazonaws.com/api
        run: npm run build

  # ─────────────────────────────────────────
  # 3. Deploy Backend
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.BASTION_HOST }}" >> ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no

          Host backend
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy Backend via Docker
        run: |
          ssh backend 'bash -s' << 'EOF'
          set -e
          cd /home/ubuntu/ren
          echo "📥 Git pull..."
          git fetch origin main
          git reset --hard origin/main

          echo "🐳 Rebuild backend container..."
          docker-compose stop backend
          docker-compose build backend
          docker-compose up -d backend

          echo "⏳ Waiting..."
          sleep 8

          echo "🏥 Health check:"
          curl -sf http://localhost:8000/api/health/ && echo "✅ Backend OK" || echo "❌ Backend FAILED"

          docker-compose ps backend
          EOF

  # ─────────────────────────────────────────
  # 4. Deploy Frontend
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.BASTION_HOST }}" >> ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no

          Host backend
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy Frontend via Docker
        run: |
          ssh backend 'bash -s' << 'EOF'
          set -e
          cd /home/ubuntu/ren
          echo "📥 Git pull..."
          git fetch origin main
          git reset --hard origin/main

          echo "🐳 Rebuild frontend container..."
          docker-compose stop frontend
          docker-compose build frontend
          docker-compose up -d frontend

          echo "⏳ Waiting..."
          sleep 5

          echo "🏥 Health check:"
          curl -sf http://localhost:80 && echo "✅ Frontend OK" || echo "❌ Frontend FAILED"

          docker-compose ps frontend
          EOF
